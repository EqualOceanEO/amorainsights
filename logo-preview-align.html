<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logo Alignment Preview</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
    body { background: #0a0f1e; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; gap: 32px; font-family: 'Inter', system-ui, sans-serif; }
    h1 { color: #9ca3af; font-size: 14px; font-weight: 400; letter-spacing: 0.1em; text-transform: uppercase; }
    .section-title { color: #6b7280; font-size: 12px; font-family: monospace; margin-bottom: 8px; }
    .row { display: flex; gap: 60px; align-items: flex-end; flex-wrap: wrap; justify-content: center; }
    .item { display: flex; flex-direction: column; align-items: center; gap: 14px; }
    .label { color: #6b7280; font-size: 12px; font-family: monospace; }

    /* Icon pushed up 2px so visual bottom = text baseline */
    .logo-wrap { display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; }
    .logo-wrap .icon { transform: translateY(-2px); }

    /* ====== A: icon 32x30, text 22px bold ====== */
    .logo-a .icon svg { width: 32px; height: 30px; }
    .logo-a .text { color: #fff; font-size: 22px; font-weight: 700; letter-spacing: 0.10em; line-height: 1; }

    /* ====== B: icon 36x34, text 22px bold ====== */
    .logo-b .icon svg { width: 36px; height: 34px; }
    .logo-b .text { color: #fff; font-size: 22px; font-weight: 700; letter-spacing: 0.10em; line-height: 1; }

    /* ====== C: icon 30x28, text 22px bold ====== */
    .logo-c .icon svg { width: 30px; height: 28px; }
    .logo-c .text { color: #fff; font-size: 22px; font-weight: 700; letter-spacing: 0.10em; line-height: 1; }

    /* ====== D: icon 32x30, text 20px bold ====== */
    .logo-d .icon svg { width: 32px; height: 30px; }
    .logo-d .text { color: #fff; font-size: 20px; font-weight: 700; letter-spacing: 0.12em; line-height: 1; }

    /* ====== E: icon 38x36, text 22px bold ====== */
    .logo-e .icon svg { width: 38px; height: 36px; }
    .logo-e .text { color: #fff; font-size: 22px; font-weight: 700; letter-spacing: 0.10em; line-height: 1; }

    /* ====== F: icon 32x30, text 24px bold ====== */
    .logo-f .icon svg { width: 32px; height: 30px; }
    .logo-f .text { color: #fff; font-size: 24px; font-weight: 800; letter-spacing: 0.08em; line-height: 1; }

    .nav-bar { background: #111827; border-top: 1px solid #1f2937; padding: 14px 24px; display: flex; align-items: center; gap: 32px; width: 100%; max-width: 700px; border-radius: 8px; }
    .nav-link { color: #9ca3af; font-size: 13px; text-decoration: none; font-family: sans-serif; }
    .nav-link:hover { color: #fff; }
  </style>
</head>
