<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人形机器人核心零部件供应商图谱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f5ff;
            --neon-pink: #ff00ff;
            --neon-amber: #ffaa00;
            --dark-bg: #0a0a0f;
            --panel-bg: rgba(20, 20, 30, 0.9);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--dark-bg);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .tech-font {
            font-family: 'Orbitron', monospace;
        }
        
        /* 背景网格 */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 245, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 245, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }
        
        .bg-grid::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at center, transparent 0%, var(--dark-bg) 70%);
        }
        
        /* 主容器 */
        .main-container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        /* 标题样式 */
        .main-title {
            text-align: center;
            margin-bottom: 3rem;
        }
        
        .main-title h1 {
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        
        .main-title p {
            color: #888;
            margin-top: 0.5rem;
            font-size: 1rem;
        }
        
        /* 机器人展示区 */
        .robot-display {
            display: grid;
            grid-template-columns: 1fr 400px 1fr;
            gap: 2rem;
            align-items: start;
        }
        
        @media (max-width: 1200px) {
            .robot-display {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
        }
        
        /* 机器人SVG容器 */
        .robot-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 700px;
        }
        
        .robot-svg {
            width: 100%;
            max-width: 350px;
            filter: drop-shadow(0 0 30px rgba(0, 245, 255, 0.3));
        }
        
        /* 热点标记 */
        .hotspot {
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .hotspot:hover {
            filter: drop-shadow(0 0 15px var(--neon-cyan));
        }
        
        .hotspot.active {
            filter: drop-shadow(0 0 25px var(--neon-pink));
        }
        
        .hotspot-circle {
            fill: rgba(0, 245, 255, 0.2);
            stroke: var(--neon-cyan);
            stroke-width: 2;
            animation: pulse 2s infinite;
        }
        
        .hotspot.active .hotspot-circle {
            fill: rgba(255, 0, 255, 0.3);
            stroke: var(--neon-pink);
        }
        
        @keyframes pulse {
            0%, 100% { r: 8; opacity: 1; }
            50% { r: 12; opacity: 0.6; }
        }
        
        /* 连接线 */
        .connection-line {
            stroke: var(--neon-cyan);
            stroke-width: 1.5;
            stroke-dasharray: 5,5;
            opacity: 0.6;
            animation: dash 20s linear infinite;
        }
        
        @keyframes dash {
            to { stroke-dashoffset: -100; }
        }
        
        /* 供应商面板 */
        .supplier-panel {
            background: var(--panel-bg);
            border: 1px solid rgba(0, 245, 255, 0.2);
            border-radius: 16px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
        }
        
        .panel-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--neon-cyan);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .panel-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: var(--neon-cyan);
            border-radius: 2px;
        }
        
        /* 供应商卡片 */
        .supplier-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 0.75rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .supplier-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 3px;
            height: 100%;
            background: var(--neon-cyan);
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .supplier-card:hover {
            background: rgba(0, 245, 255, 0.05);
            border-color: rgba(0, 245, 255, 0.3);
            transform: translateX(5px);
        }
        
        .supplier-card:hover::before {
            opacity: 1;
        }
        
        .supplier-card.active {
            background: rgba(255, 0, 255, 0.1);
            border-color: var(--neon-pink);
        }
        
        .supplier-card.active::before {
            background: var(--neon-pink);
            opacity: 1;
        }
        
        .supplier-name {
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 0.25rem;
        }
        
        .supplier-name-cn {
            color: #888;
            font-size: 0.8rem;
        }
        
        .supplier-meta {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
            flex-wrap: wrap;
        }
        
        .tag {
            font-size: 0.7rem;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-weight: 500;
        }
        
        .tag-public {
            background: rgba(0, 255, 100, 0.15);
            color: #00ff64;
        }
        
        .tag-private {
            background: rgba(255, 170, 0, 0.15);
            color: #ffaa00;
        }
        
        .tag-product {
            background: rgba(0, 245, 255, 0.15);
            color: var(--neon-cyan);
        }
        
        /* 详情面板 */
        .detail-panel {
            background: var(--panel-bg);
            border: 1px solid rgba(255, 0, 255, 0.3);
            border-radius: 16px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
            min-height: 500px;
        }
        
        .detail-header {
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 1rem;
            margin-bottom: 1rem;
        }
        
        .detail-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--neon-pink);
        }
        
        .detail-subtitle {
            color: #888;
            font-size: 0.9rem;
            margin-top: 0.25rem;
        }
        
        .detail-section {
            margin-bottom: 1.25rem;
        }
        
        .detail-label {
            font-size: 0.75rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
        }
        
        .detail-value {
            font-size: 0.9rem;
            line-height: 1.6;
            color: #ccc;
        }
        
        .detail-products {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        
        .product-tag {
            background: rgba(0, 245, 255, 0.1);
            border: 1px solid rgba(0, 245, 255, 0.3);
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--neon-cyan);
        }
        
        .detail-customers {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        
        .customer-tag {
            background: rgba(255, 0, 255, 0.1);
            border: 1px solid rgba(255, 0, 255, 0.3);
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--neon-pink);
        }
        
        /* 图例 */
        .legend {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: #888;
        }
        
        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        
        .legend-dot.reducer { background: var(--neon-cyan); box-shadow: 0 0 10px var(--neon-cyan); }
        .legend-dot.motor { background: var(--neon-pink); box-shadow: 0 0 10px var(--neon-pink); }
        .legend-dot.sensor { background: var(--neon-amber); box-shadow: 0 0 10px var(--neon-amber); }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: #666;
        }
        
        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 1rem;
            opacity: 0.3;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .main-title h1 {
                font-size: 1.5rem;
            }
            
            .robot-container {
                min-height: 500px;
            }
            
            .supplier-panel, .detail-panel {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    
    <div class="main-container">
        <div class="main-title">
            <h1 class="tech-font">Humanoid Robot</h1>
            <p>人形机器人核心零部件供应商图谱 · 点击部位查看供应商详情</p>
        </div>
        
        <div class="robot-display">
            <!-- 左侧：零部件列表 -->
            <div class="supplier-panel">
                <div class="panel-title">核心零部件分类</div>
                
                <div class="supplier-card" data-part="head" onclick="selectPart('head')">
                    <div class="supplier-name">3D视觉/激光雷达</div>
                    <div class="supplier-name-cn">头部感知系统</div>
                    <div class="supplier-meta">
                        <span class="tag tag-public">奥比中光</span>
                        <span class="tag tag-public">速腾聚创</span>
                        <span class="tag tag-public">禾赛科技</span>
                    </div>
                </div>
                
                <div class="supplier-card" data-part="torso" onclick="selectPart('torso')">
                    <div class="supplier-name">IMU/主控芯片</div>
                    <div class="supplier-name-cn">躯干控制</div>
                    <div class="supplier-meta">
                        <span class="tag tag-public">芯动联科</span>
                        <span class="tag tag-product">地平线</span>
                    </div>
                </div>
                
                <div class="supplier-card" data-part="arm" onclick="selectPart('arm')">
                    <div class="supplier-name">谐波减速器 + 无框电机</div>
                    <div class="supplier-name-cn">手臂关节</div>
                    <div class="supplier-meta">
                        <span class="tag tag-public">绿的谐波</span>
                        <span class="tag tag-public">步科股份</span>
                        <span class="tag tag-private">来福谐波</span>
                    </div>
                </div>
                
                <div class="supplier-card" data-part="hand" onclick="selectPart('hand')">
                    <div class="supplier-name">灵巧手/微型伺服</div>
                    <div class="supplier-name-cn">末端执行器</div>
                    <div class="supplier-meta">
                        <span class="tag tag-private">因时机器人</span>
                        <span class="tag tag-private">帕西尼感知</span>
                    </div>
                </div>
                
                <div class="supplier-card" data-part="leg" onclick="selectPart('leg')">
                    <div class="supplier-name">行星/谐波减速器 + 力传感器</div>
                    <div class="supplier-name-cn">腿部关节</div>
                    <div class="supplier-meta">
                        <span class="tag tag-public">双环传动</span>
                        <span class="tag tag-public">中大力德</span>
                        <span class="tag tag-private">宇立仪器</span>
                    </div>
                </div>
                
                <div class="supplier-card" data-part="foot" onclick="selectPart('foot')">
                    <div class="supplier-name">六维力传感器</div>
                    <div class="supplier-name-cn">足部感知</div>
                    <div class="supplier-meta">
                        <span class="tag tag-private">宇立仪器</span>
                        <span class="tag tag-public">柯力传感</span>
                    </div>
                </div>
            </div>
            
            <!-- 中间：机器人图示 -->
            <div class="robot-container">
                <svg class="robot-svg" viewBox="0 0 300 700" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- 定义渐变 -->
                    <defs>
                        <linearGradient id="bodyGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" style="stop-color:#1a1a2e"/>
                            <stop offset="50%" style="stop-color:#2d2d44"/>
                            <stop offset="100%" style="stop-color:#1a1a2e"/>
                        </linearGradient>
                        <linearGradient id="jointGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#00f5ff"/>
                            <stop offset="100%" style="stop-color:#0088aa"/>
                        </linearGradient>
                        <filter id="glow">
                            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                            <feMerge>
                                <feMergeNode in="coloredBlur"/>
                                <feMergeNode in="SourceGraphic"/>
                            </feMerge>
                        </filter>
                    </defs>
                    
                    <!-- 连接线 -->
                    <line class="connection-line" x1="150" y1="80" x2="280" y2="60"/>
                    <line class="connection-line" x1="150" y1="180" x2="280" y2="160"/>
                    <line class="connection-line" x1="80" y1="250" x2="20" y2="230"/>
                    <line class="connection-line" x1="220" y1="250" x2="280" y2="230"/>
                    <line class="connection-line" x1="80" y1="450" x2="20" y2="430"/>
                    <line class="connection-line" x1="220" y1="450" x2="280" y2="430"/>
                    <line class="connection-line" x1="100" y1="600" x2="20" y2="580"/>
                    <line class="connection-line" x1="200" y1="600" x2="280" y2="580"/>
                    
                    <!-- 头部 -->
                    <g id="part-head" class="hotspot" onclick="selectPart('head')">
                        <circle cx="150" cy="50" r="35" fill="url(#bodyGradient)" stroke="#00f5ff" stroke-width="2"/>
                        <circle cx="135" cy="45" r="8" fill="#00f5ff" filter="url(#glow)"/>
                        <circle cx="165" cy="45" r="8" fill="#00f5ff" filter="url(#glow)"/>
                        <rect x="140" y="60" width="20" height="3" rx="1.5" fill="#00f5ff"/>
                        <circle class="hotspot-circle" cx="150" cy="50" r="45"/>
                    </g>
                    
                    <!-- 颈部 -->
                    <rect x="140" y="85" width="20" height="15" fill="#2d2d44" stroke="#00f5ff" stroke-width="1"/>
                    
                    <!-- 躯干 -->
                    <g id="part-torso" class="hotspot" onclick="selectPart('torso')">
                        <path d="M110 100 L190 100 L180 220 L120 220 Z" fill="url(#bodyGradient)" stroke="#00f5ff" stroke-width="2"/>
                        <rect x="130" y="130" width="40" height="60" rx="5" fill="rgba(0,245,255,0.1)" stroke="#00f5ff" stroke-width="1"/>
                        <circle cx="150" cy="160" r="15" fill="none" stroke="#00f5ff" stroke-width="2"/>
                        <circle cx="150" cy="160" r="5" fill="#00f5ff" filter="url(#glow)"/>
                        <circle class="hotspot-circle" cx="150" cy="160" r="70"/>
                    </g>
                    
                    <!-- 左臂 -->
                    <g id="part-arm-left" class="hotspot" onclick="selectPart('arm')">
                        <!-- 肩关节 -->
                        <circle cx="85" cy="120" r="20" fill="url(#jointGradient)" stroke="#00f5ff" stroke-width="2"/>
                        <!-- 上臂 -->
                        <rect x="70" y="140" width="30" height="80" rx="5" fill="url(#bodyGradient)" stroke="#00f5ff" stroke-width="1.5"/>
                        <!-- 肘关节 -->
                        <circle cx="85" cy="230" r="15" fill="url(#jointGradient)" stroke="#00f5ff" stroke-width="2"/>
                        <!-- 前臂 -->
                        <rect x="72" y="245" width="26" height="70" rx="4" fill="url(#bodyGradient)" stroke="#00f5ff" stroke-width="1.5"/>
                        <!-- 腕关节 -->
                        <circle cx="85" cy="325" r="12" fill="url(#jointGradient)" stroke="#00f5ff" stroke-width="2"/>
                        <circle class="hotspot-circle" cx="85" cy="220" r="50"/>
                    </g>
                    
                    <!-- 右臂 -->
                    <g id="part-arm-right" class="hotspot" onclick="selectPart('arm')">
                        <!-- 肩关节 -->
                        <circle cx="215" cy="120" r="20" fill="url(#jointGradient)" stroke="#00f5ff" stroke-width="2"/>
                        <!-- 上臂 -->
                        <rect x="200" y="140" width="30" height="80" rx="5" fill="url(#bodyGradient)" stroke="#00f5ff" stroke-width="1.5"/>
                        <!-- 肘关节 -->
                        <circle cx="215" cy="230" r="15" fill="url(#jointGradient)" stroke="#00f5ff" stroke-width="2"/>
                        <!-- 前臂 -->
                        <rect x="202" y="245" width="26" height="70" rx="4" fill="url(#bodyGradient)" stroke="#00f5ff" stroke-width="1.5"/>
                        <!-- 腕关节 -->
                        <circle cx="215" cy="325" r="12" fill="url(#jointGradient)" stroke="#00f5ff" stroke-width="2"/>
                        <circle class="hotspot-circle" cx="215" cy="220" r="50"/>
                    </g>
                    
                    <!-- 左手 -->
                    <g id="part-hand-left" class="hotspot" onclick="selectPart('hand')">
                        <rect x="75" y="335" width="20" height="25" rx="3" fill="url(#bodyGradient)" stroke="#ff00ff" stroke-width="2"/>
                        <rect x="72" y="362" width="6" height="20" rx="2" fill="#2d2d44" stroke="#ff00ff" stroke-width="1"/>
                        <rect x="80" y="362" width="6" height="22" rx="2" fill="#2d2d44" stroke="#ff00ff" stroke-width="1"/>
                        <rect x="88" y="362" width="6" height="20" rx="2" fill="#2d2d44" stroke="#ff00ff" stroke-width="1"/>
                        <rect x="96" y="362" width="5" height="15" rx="2" fill="#2d2d44" stroke="#ff00ff" stroke-width="1"/>
                        <circle class="hotspot-circle" cx="85" cy="360" r="30"/>
                    </g>
                    
                    <!-- 右手 -->
                    <g id="part-hand-right" class="hotspot" onclick="selectPart('hand')">
                        <rect x="205" y="335" width="20" height="25" rx="3" fill="url(#bodyGradient)" stroke="#ff00ff" stroke-width="2"/>
                        <rect x="202" y="362" width="5" height="15" rx="2" fill="#2d2d44" stroke="#ff00ff" stroke-width="1"/>
                        <rect x="209" y="362" width="6" height="20" rx="2" fill="#2d2d44" stroke="#ff00ff" stroke-width="1"/>
                        <rect x="217" y="362" width="6" height="22" rx="2" fill="#2d2d44" stroke="#ff00ff" stroke-width="1"/>
                        <rect x="225" y="362" width="6" height="20" rx="2" fill="#2d2d44" stroke="#ff00ff" stroke-width="1"/>
                        <circle class="hotspot-circle" cx="215" cy="360" r="30"/>
                    </g>
                    
                    <!-- 左腿 -->
                    <g id="part-leg-left" class="hotspot" onclick="selectPart('leg')">
                        <!-- 髋关节 -->
                        <circle cx="125" cy="235" r="18" fill="url(#jointGradient)" stroke="#ffaa00" stroke-width="2"/>
                        <!-- 大腿 -->
                        <rect x="112" y="253" width="26" height="100" rx="5" fill="url(#bodyGradient)" stroke="#ffaa00" stroke-width="1.5"/>
                        <!-- 膝关节 -->
                        <circle cx="125" cy="360" r="16" fill="url(#jointGradient)" stroke="#ffaa00" stroke-width="2"/>
                        <!-- 小腿 -->
                        <rect x="114" y="378" width="22" height="90" rx="4" fill="url(#bodyGradient)" stroke="#ffaa00" stroke-width="1.5"/>
                        <!-- 踝关节 -->
                        <circle cx="125" cy="475" r="14" fill="url(#jointGradient)" stroke="#ffaa00" stroke-width="2"/>
                        <circle class="hotspot-circle" cx="125" cy="360" r="55"/>
                    </g>
                    
                    <!-- 右腿 -->
                    <g id="part-leg-right" class="hotspot" onclick="selectPart('leg')">
                        <!-- 髋关节 -->
                        <circle cx="175" cy="235" r="18" fill="url(#jointGradient)" stroke="#ffaa00" stroke-width="2"/>
                        <!-- 大腿 -->
                        <rect x="162" y="253" width="26" height="100" rx="5" fill="url(#bodyGradient)" stroke="#ffaa00" stroke-width="1.5"/>
                        <!-- 膝关节 -->
                        <circle cx="175" cy="360" r="16" fill="url(#jointGradient)" stroke="#ffaa00" stroke-width="2"/>
                        <!-- 小腿 -->
                        <rect x="164" y="378" width="22" height="90" rx="4" fill="url(#bodyGradient)" stroke="#ffaa00" stroke-width="1.5"/>
                        <!-- 踝关节 -->
                        <circle cx="175" cy="475" r="14" fill="url(#jointGradient)" stroke="#ffaa00" stroke-width="2"/>
                        <circle class="hotspot-circle" cx="175" cy="360" r="55"/>
                    </g>
                    
                    <!-- 左脚 -->
                    <g id="part-foot-left" class="hotspot" onclick="selectPart('foot')">
                        <path d="M105 490 L145 490 L150 520 L100 520 Z" fill="url(#bodyGradient)" stroke="#ff00ff" stroke-width="2"/>
                        <rect x="110" y="495" width="30" height="3" fill="#ff00ff" opacity="0.5"/>
                        <circle class="hotspot-circle" cx="125" cy="505" r="30"/>
                    </g>
                    
                    <!-- 右脚 -->
                    <g id="part-foot-right" class="hotspot" onclick="selectPart('foot')">
                        <path d="M155 490 L195 490 L200 520 L150 520 Z" fill="url(#bodyGradient)" stroke="#ff00ff" stroke-width="2"/>
                        <rect x="160" y="495" width="30" height="3" fill="#ff00ff" opacity="0.5"/>
                        <circle class="hotspot-circle" cx="175" cy="505" r="30"/>
                    </g>
                </svg>
            </div>
            
            <!-- 右侧：详情面板 -->
            <div class="detail-panel" id="detailPanel">
                <div class="empty-state">

        function selectPart(partId) {

            // 添加新的active状态
            const hotspots = document.querySelectorAll(`[id*="${partId}"]`);
            hotspots.forEach(el => el.classList.add('active'));
            
            const card = document.querySelector(`[data-part="${partId}"]`);
            if (card) card.classList.add('active');
            
            currentPart = partId;
            
            // 更新详情面板
            updateDetailPanel(partId);
        }
