<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" fill="none">
  <defs>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
  </defs>

  <!-- Icon mark (32x32 in a 64x64 container, centered) -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="#060d1c"/>
  <!-- Bar 1 -->
  <rect x="10" y="18" width="44" height="6" rx="3" fill="url(#barGrad)"/>
  <!-- Bar 2 -->
  <rect x="10" y="30" width="32" height="6" rx="3" fill="url(#barGrad)" opacity="0.7"/>
  <!-- Bar 3 -->
  <rect x="10" y="42" width="20" height="6" rx="3" fill="url(#barGrad)" opacity="0.4"/>

  <!-- Wordmark -->
  <!-- AMORA -->
  <text
    x="84"
    y="38"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="28"
    font-weight="700"
    letter-spacing="4"
    fill="url(#textGrad)"
  >AMORA</text>

  <!-- Tagline -->
  <text
    x="85"
    y="54"
    font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="9"
    font-weight="400"
    letter-spacing="2.5"
    fill="#3b82f6"
    opacity="0.9"
  >INSIGHTS</text>
</svg>
