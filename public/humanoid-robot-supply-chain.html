    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .header h1 {
            font-size: 28px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .legend {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }
        
        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 4px;
        }
        
        .legend-color.china { background: #10b981; }
        .legend-color.usa { background: #ef4444; }
        .legend-color.eu { background: #3b82f6; }
        .legend-color.japan { background: #f59e0b; }
        .legend-color.other { background: #6b7280; }
        
        .main-content {
            display: grid;
            grid-template-columns: 280px 1fr 380px;
            gap: 20px;
        }
        
        @media (max-width: 1200px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
        
        /* 左侧分类列表 */
        .category-panel {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            height: fit-content;
        }
        
        .category-panel h3 {
            font-size: 16px;
            margin-bottom: 15px;
            color: #00d4ff;
        }
        
        .category-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .category-item {
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            border-left: 3px solid transparent;
        }
        
        .category-item:hover, .category-item.active {
            background: rgba(0,212,255,0.15);
            border-left-color: #00d4ff;
        }
        
        .category-item .name {
            font-weight: 600;
            font-size: 14px;
        }
        
        .category-item .part {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }
        
        /* 中间机器人图示 */
        .robot-panel {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            min-height: 600px;
        }
        
        .robot-svg {
            width: 100%;
            max-width: 350px;
            height: auto;
        }
        
        .robot-part {
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .robot-part:hover {
            filter: brightness(1.3);
        }
        
        .robot-part.active {
            filter: brightness(1.5) drop-shadow(0 0 10px currentColor);
        }
        
        .pulse-ring {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }
        
        .part-label {
            position: absolute;
            background: rgba(0,0,0,0.8);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            pointer-events: none;
            border: 1px solid;
        }
        
        /* 右侧供应商详情 */
        .detail-panel {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

            font-size: 16px;
            margin-bottom: 15px;
            color: #00d4ff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

            margin-bottom: 20px;
        }

            font-size: 14px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .supplier-section.usa h4 { color: #ef4444; }
        .supplier-section.eu h4 { color: #3b82f6; }
        .supplier-section.japan h4 { color: #f59e0b; }
        .supplier-section.other h4 { color: #6b7280; }
        
        .supplier-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .supplier-item {
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            border-left: 3px solid;
        }
        
        .supplier-item.china { border-left-color: #10b981; }
        .supplier-item.usa { border-left-color: #ef4444; }
        .supplier-item.eu { border-left-color: #3b82f6; }
        .supplier-item.japan { border-left-color: #f59e0b; }
        .supplier-item.other { border-left-color: #6b7280; }
        
        .supplier-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .supplier-tag {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 500;
        }
        
        .supplier-tag.ipo { background: rgba(16,185,129,0.2); color: #10b981; }

        .supplier-product {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 4px;
        }
        
        .supplier-clients {
            font-size: 11px;
            color: #666;
        }
        
        .risk-alert {
            margin-top: 15px;
            padding: 12px;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 8px;
        }
        
        .risk-alert h4 {
            color: #ef4444;

            margin-bottom: 8px;
        }
        
        .risk-alert p {
            font-size: 12px;
            color: #aaa;
            line-height: 1.6;
        }
        
        .risk-level {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 8px;
        }
        
        .risk-level.high { background: #ef4444; color: white; }
        .risk-level.medium { background: #f59e0b; color: white; }
        .risk-level.low { background: #10b981; color: white; }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

                item.addEventListener('click', function() {
                    const part = this.dataset.part;
                    
                    // 更新列表状态
                    document.querySelectorAll('.category-item').forEach(i => i.classList.remove('active'));
                    this.classList.add('active');
                    
                    // 更新机器人高亮
                    document.querySelectorAll('.robot-part').forEach(p => p.classList.remove('active'));
                    document.querySelectorAll(`[data-part="${part}"]`).forEach(p => p.classList.add('active'));
                    
                    // 渲染详情
                    renderDetail(part);
                });
            });
            
            // 机器人部位点击
            document.querySelectorAll('.robot-part').forEach(part => {
                part.addEventListener('click', function() {
                    const partKey = this.dataset.part;
                    
                    // 更新列表状态
                    document.querySelectorAll('.category-item').forEach(i => i.classList.remove('active'));
