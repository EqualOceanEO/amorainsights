<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AMORA Favicon 方案</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #080f1e; font-family: -apple-system, sans-serif; color: #fff; padding: 48px; }
  h1 { font-size: 11px; letter-spacing: 3px; color: #334155; text-transform: uppercase; margin-bottom: 48px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 40px; max-width: 720px; }
  .card { display: flex; flex-direction: column; align-items: center; gap: 20px; }
  .preview { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .row { display: flex; align-items: center; gap: 10px; }
  .tag { font-size: 10px; color: #334155; width: 20px; text-align: right; }
  .name { font-size: 13px; color: #94a3b8; font-weight: 500; margin-top: 4px; }
  .desc { font-size: 11px; color: #475569; text-align: center; line-height: 1.6; max-width: 140px; }

  /* Tab bar simulation */
  .tabbar { margin-top: 56px; }
  .tabbar-label { font-size: 10px; letter-spacing: 2px; color: #1e3a5f; text-transform: uppercase; margin-bottom: 12px; }
  .tabs { display: flex; gap: 2px; background: #0f172a; padding: 6px; border-radius: 8px; width: fit-content; }
  .tab { display: flex; align-items: center; gap: 6px; background: #1e293b; padding: 5px 14px; border-radius: 5px; font-size: 11px; color: #94a3b8; }
  .tab.active { background: #0f172a; color: #cbd5e1; }
</style>
</head>
<body>

<h1>AMORA · Favicon Design</h1>

<div class="grid">

  <!-- E: 上升折线，行情图感 -->
  <div class="card">
    <div class="preview">
      <div class="row">
        <span class="tag">16</span>
        <svg width="16" height="16" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
          <rect width="32" height="32" rx="7" fill="#060d1c"/>
          <polyline points="5,23 12,15 18,19 27,8" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="27" cy="8" r="2.2" fill="#60a5fa"/>
        </svg>
      </div>
      <div class="row">
        <span class="tag">32</span>
        <svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
          <rect width="32" height="32" rx="7" fill="#060d1c"/>
          <polyline points="5,23 12,15 18,19 27,8" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="27" cy="8" r="2.2" fill="#60a5fa"/>
        </svg>
      </div>
      <div class="row">
        <span class="tag">64</span>
        <svg width="64" height="64" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
          <rect width="32" height="32" rx="7" fill="#060d1c"/>
          <polyline points="5,23 12,15 18,19 27,8" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="27" cy="8" r="2.2" fill="#60a5fa"/>
        </svg>
      </div>
    </div>
    <div class="name">E · 折线</div>
    <div class="desc">上升趋势线，情报/行情感</div>
  </div>

  <!-- F: 六边形网格节点 -->
  <div class="card">
    <div class="preview">
      <div class="row">
        <span class="tag">16</span>
        <svg width="16" height="16" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
          <rect width="32" height="32" rx="7" fill="#060d1c"/>
          <polygon points="16,4 26,10 26,22 16,28 6,22 6,10" fill="none" stroke="#3b82f6" stroke-width="1.8"/>
          <circle cx="16" cy="16" r="3" fill="#60a5fa"/>
          <line x1="16" y1="4" x2="16" y2="13" stroke="#1d4ed8" stroke-width="1"/>
          <line x1="26" y1="10" x2="19" y2="14" stroke="#1d4ed8" stroke-width="1"/>
          <line x1="26" y1="22" x2="19" y2="18" stroke="#1d4ed8" stroke-width="1"/>
        </svg>
      </div>
      <div class="row">
        <span class="tag">32</span>
        <svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
          <rect width="32" height="32" rx="7" fill="#060d1c"/>
          <polygon points="16,4 26,10 26,22 16,28 6,22 6,10" fill="none" stroke="#3b82f6" stroke-width="1.8"/>
          <circle cx="16" cy="16" r="3" fill="#60a5fa"/>
          <line x1="16" y1="4" x2="16" y2="13" stroke="#1d4ed8" stroke-width="1"/>
          <line x1="26" y1="10" x2="19" y2="14" stroke="#1d4ed8" stroke-width="1"/>
          <line x1="26" y1="22" x2="19" y2="18" stroke="#1d4ed8" stroke-width="1"/>
        </svg>
      </div>
      <div class="row">
        <span class="tag">64</span>
        <svg width="64" height="64" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
          <rect width="32" height="32" rx="7" fill="#060d1c"/>
          <polygon points="16,4 26,10 26,22 16,28 6,22 6,10" fill="none" stroke="#3b82f6" stroke-width="1.8"/>
          <circle cx="16" cy="16" r="3" fill="#60a5fa"/>
          <line x1="16" y1="4" x2="16" y2="13" stroke="#1d4ed8" stroke-width="1"/>
          <line x1="26" y1="10" x2="19" y2="14" stroke="#1d4ed8" stroke-width="1"/>
          <line x1="26" y1="22" x2="19" y2="18" stroke="#1d4ed8" stroke-width="1"/>
        </svg>
      </div>
    </div>
    <div class="name">F · 六边形</div>
    <div class="desc">网络节点，行业图谱感</div>
  </div>

  <!-- G: 三条平行线（信号/数据流）-->
  <div class="card">
    <div class="preview">
      <div class="row">
        <span class="tag">16</span>
        <svg width="16" height="16" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#1d4ed8"/>
              <stop offset="100%" stop-color="#60a5fa"/>
            </linearGradient>
          </defs>
          <rect width="32" height="32" rx="7" fill="#060d1c"/>
          <rect x="5" y="9" width="22" height="3" rx="1.5" fill="url(#lg1)"/>
          <rect x="5" y="15" width="16" height="3" rx="1.5" fill="url(#lg1)" opacity="0.7"/>
          <rect x="5" y="21" width="10" height="3" rx="1.5" fill="url(#lg1)" opacity="0.4"/>
        </svg>
      </div>
      <div class="row">
        <span class="tag">32</span>
        <svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="lg2" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#1d4ed8"/>
              <stop offset="100%" stop-color="#60a5fa"/>
            </linearGradient>
          </defs>
          <rect width="32" height="32" rx="7" fill="#060d1c"/>
          <rect x="5" y="9" width="22" height="3" rx="1.5" fill="url(#lg2)"/>
          <rect x="5" y="15" width="16" height="3" rx="1.5" fill="url(#lg2)" opacity="0.7"/>
          <rect x="5" y="21" width="10" height="3" rx="1.5" fill="url(#lg2)" opacity="0.4"/>
        </svg>
      </div>
      <div class="row">
        <span class="tag">64</span>
        <svg width="64" height="64" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="lg3" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#1d4ed8"/>
              <stop offset="100%" stop-color="#60a5fa"/>
            </linearGradient>
          </defs>
          <rect width="32" height="32" rx="7" fill="#060d1c"/>
          <rect x="5" y="9" width="22" height="3" rx="1.5" fill="url(#lg3)"/>
          <rect x="5" y="15" width="16" height="3" rx="1.5" fill="url(#lg3)" opacity="0.7"/>
          <rect x="5" y="21" width="10" height="3" rx="1.5" fill="url(#lg3)" opacity="0.4"/>
        </svg>
      </div>
    </div>
    <div class="name">G · 数据流</div>
    <div class="desc">渐变条形，研究报告感</div>
  </div>

  <!-- H: 脉冲/雷达圆 -->
  <div class="card">
    <div class="preview">
      <div class="row">
        <span class="tag">16</span>
        <svg width="16" height="16" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
          <rect width="32" height="32" rx="7" fill="#060d1c"/>
          <circle cx="16" cy="16" r="11" fill="none" stroke="#1d4ed8" stroke-width="1" opacity="0.4"/>
          <circle cx="16" cy="16" r="7" fill="none" stroke="#2563eb" stroke-width="1" opacity="0.6"/>
          <circle cx="16" cy="16" r="3.5" fill="#3b82f6"/>
          <line x1="16" y1="5" x2="16" y2="16" stroke="#60a5fa" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/>
          <line x1="16" y1="16" x2="23" y2="11" stroke="#60a5fa" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
        </svg>
      </div>
      <div class="row">
        <span class="tag">32</span>
        <svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
          <rect width="32" height="32" rx="7" fill="#060d1c"/>
          <circle cx="16" cy="16" r="11" fill="none" stroke="#1d4ed8" stroke-width="1" opacity="0.4"/>
          <circle cx="16" cy="16" r="7" fill="none" stroke="#2563eb" stroke-width="1" opacity="0.6"/>
          <circle cx="16" cy="16" r="3.5" fill="#3b82f6"/>
          <line x1="16" y1="5" x2="16" y2="16" stroke="#60a5fa" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/>
          <line x1="16" y1="16" x2="23" y2="11" stroke="#60a5fa" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
        </svg>
      </div>
      <div class="row">
        <span class="tag">64</span>
        <svg width="64" height="64" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
          <rect width="32" height="32" rx="7" fill="#060d1c"/>
          <circle cx="16" cy="16" r="11" fill="none" stroke="#1d4ed8" stroke-width="1" opacity="0.4"/>
          <circle cx="16" cy="16" r="7" fill="none" stroke="#2563eb" stroke-width="1" opacity="0.6"/>
          <circle cx="16" cy="16" r="3.5" fill="#3b82f6"/>
          <line x1="16" y1="5" x2="16" y2="16" stroke="#60a5fa" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/>
          <line x1="16" y1="16" x2="23" y2="11" stroke="#60a5fa" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
        </svg>
      </div>
    </div>
    <div class="name">H · 雷达</div>
    <div class="desc">同心圆+指针，扫描/洞察感</div>
  </div>

</div>

<!-- Tab bar simulation -->
<div class="tabbar">
  <div class="tabbar-label">浏览器标签栏模拟</div>
  <div class="tabs">
    <div class="tab">
      <svg width="16" height="16" viewBox="0 0 32 32"><rect width="32" height="32" rx="7" fill="#060d1c"/><polyline points="5,23 12,15 18,19 27,8" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="27" cy="8" r="2.2" fill="#60a5fa"/></svg>
      E &nbsp;AmoraInsights
    </div>
    <div class="tab">
      <svg width="16" height="16" viewBox="0 0 32 32"><rect width="32" height="32" rx="7" fill="#060d1c"/><polygon points="16,4 26,10 26,22 16,28 6,22 6,10" fill="none" stroke="#3b82f6" stroke-width="1.8"/><circle cx="16" cy="16" r="3" fill="#60a5fa"/><line x1="16" y1="4" x2="16" y2="13" stroke="#1d4ed8" stroke-width="1"/><line x1="26" y1="10" x2="19" y2="14" stroke="#1d4ed8" stroke-width="1"/><line x1="26" y1="22" x2="19" y2="18" stroke="#1d4ed8" stroke-width="1"/></svg>

      G &nbsp;AmoraInsights
    </div>
    <div class="tab">
      <svg width="16" height="16" viewBox="0 0 32 32"><rect width="32" height="32" rx="7" fill="#060d1c"/><circle cx="16" cy="16" r="11" fill="none" stroke="#1d4ed8" stroke-width="1" opacity="0.4"/><circle cx="16" cy="16" r="7" fill="none" stroke="#2563eb" stroke-width="1" opacity="0.6"/><circle cx="16" cy="16" r="3.5" fill="#3b82f6"/><line x1="16" y1="5" x2="16" y2="16" stroke="#60a5fa" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/><line x1="16" y1="16" x2="23" y2="11" stroke="#60a5fa" stroke-width="1" stroke-linecap="round" opacity="0.5"/></svg>

  </div>
</div>

</body>
