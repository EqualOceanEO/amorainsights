<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMORA HRI 2026 - assets</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #05080f;
    --bg2: #0a1020;
    --bg3: #0f1830;
    --card: #0d1a2d;
    --card2: #111e38;
    --accent: #00c8ff;
    --accent2: #7c3aed;
    --accent3: #f59e0b;
    --text: #e2eaf4;
    --text2: #8899bb;
    --text3: #4a5d7a;
    --green: #10b981;
    --red: #ef4444;
    --border: rgba(0,200,255,0.12);
    --glow: rgba(0,200,255,0.15);
    --glow2: rgba(124,58,237,0.15);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'PingFang SC','Microsoft YaHei','Helvetica Neue',Arial,sans-serif;
    font-size: 15px;
    line-height: 1.7;
    overflow-x: hidden;
  }

  /* ===== NAVIGATION ===== */
  #nav {
    position: fixed;
    left: 0; top: 0; bottom: 0;
    width: 220px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    z-index: 1000;
    overflow-y: auto;
    padding: 20px 0;
    transition: transform 0.3s;
  }
  #nav::-webkit-scrollbar { width: 4px; }
  #nav::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }
  .nav-logo {
    font-size: 20px;
    font-weight: 900;
    letter-spacing: 4px;
    color: var(--accent);
    text-align: center;
    padding: 0 20px 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 10px;
  }
  .nav-logo span { color: var(--text2); font-weight: 400; font-size: 11px; letter-spacing: 1px; display: block; margin-top: 4px; }
  .nav-section { padding: 0 12px; margin-bottom: 6px; }
  .nav-section-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text3);
    padding: 8px 8px 4px;
    text-transform: uppercase;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 8px;
    color: var(--text2);
    text-decoration: none;
    font-size: 13px;
    border-radius: 8px;
    transition: all 0.2s;
    cursor: pointer;
  }
  .nav-item:hover, .nav-item.active {
    background: var(--glow);
    color: var(--accent);
  }
  .nav-item .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text3);
    flex-shrink: 0;
  }
  .nav-item.active .dot { background: var(--accent); box-shadow: 0 0 8px var(--accent); }

  /* ===== MAIN CONTENT ===== */
  #main {
    margin-left: 220px;
    min-height: 100vh;
  }

  /* ===== HERO ===== */
  #hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    background:
      radial-gradient(ellipse 80% 60% at 50% 40%, rgba(0,200,255,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 20% 80%, rgba(124,58,237,0.08) 0%, transparent 60%),
      var(--bg);
    position: relative;
    overflow: hidden;
  }
  #hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,200,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,200,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: gridMove 20s linear infinite;
  }
  @keyframes gridMove {
    0% { transform: translateY(0); }
    100% { transform: translateY(60px); }
  }
  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 16px;
    border: 1px solid var(--accent);
    border-radius: 20px;
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 2px;
    margin-bottom: 30px;
    background: var(--glow);
  }
  .hero-badge .pulse {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: blink 1.5s infinite;
  }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .hero-title {
    font-size: clamp(42px, 6vw, 80px);
    font-weight: 900;
    letter-spacing: -1px;
    line-height: 1.1;
    margin-bottom: 16px;
  }
  .hero-title .gradient {
    background: linear-gradient(135deg, #fff 0%, var(--accent) 50%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hero-sub {
    font-size: 18px;
    color: var(--text2);
    max-width: 600px;
    margin: 0 auto 40px;
  }
  .hero-meta {
    display: flex;
    gap: 40px;
    margin-bottom: 50px;
  }
  .hero-stat {
    text-align: center;
  }
  .hero-stat .val {
    font-size: 36px;
    font-weight: 900;
    color: var(--accent);
    display: block;
  }
  .hero-stat .label {
    font-size: 12px;
    color: var(--text2);
    letter-spacing: 1px;
  }
  .hero-scroll {
    position: absolute;
    bottom: 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    color: var(--text3);
    font-size: 11px;
    letter-spacing: 2px;
    animation: bounce 2s infinite;
  }
  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(8px); }
  }
  .hero-scroll-arrow {
    width: 20px; height: 20px;
    border-right: 2px solid var(--text3);
    border-bottom: 2px solid var(--text3);
    transform: rotate(45deg);
  }

  /* ===== SECTIONS ===== */
  section {
    max-width: 1100px;
    margin: 0 auto;
    padding: 80px 48px;
    border-bottom: 1px solid var(--border);
  }
  section:nth-child(even) {
    background: var(--bg2);
  }
  .section-tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .section-tag::before {
    content: '';
    width: 24px; height: 1px;
    background: var(--accent);
  }
  h1 {
    font-size: clamp(28px, 4vw, 44px);
    font-weight: 900;
    line-height: 1.2;
    margin-bottom: 12px;
  }
  h1 .highlight {
    color: var(--accent);
  }
  h2 {
    font-size: clamp(20px, 2.5vw, 28px);
    font-weight: 700;
    margin-bottom: 20px;
    color: var(--text);
  }
  h3 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 12px;
    color: var(--text);
  }
  h4 {
    font-size: 14px;
    font-weight: 600;
    color: var(--text2);
    letter-spacing: 1px;
    margin: 20px 0 10px;
    text-transform: uppercase;
  }
  .section-intro {
    font-size: 16px;
    color: var(--text2);
    max-width: 700px;
    margin-bottom: 48px;
    line-height: 1.8;
  }

  /* ===== CARDS ===== */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 20px;
  }
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 16px;
    margin: 24px 0;
  }
  .card-sm {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .card-sm:hover {
    border-color: rgba(0,200,255,0.3);
    box-shadow: 0 0 20px var(--glow);
  }
  .card-title {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .card-desc {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.7;
  }
  .card-tag {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .tag-us { background: rgba(59,130,246,0.15); color: #60a5fa; }
  .tag-cn { background: rgba(239,68,68,0.15); color: #f87171; }
  .tag-eu { background: rgba(16,185,129,0.15); color: #34d399; }
  .tag-pro { background: rgba(124,58,237,0.15); color: #a78bfa; }
  .tag-free { background: rgba(0,200,255,0.12); color: var(--accent); }

  /* ===== TABLES ===== */
  .table-wrap { overflow-x: auto; margin: 20px 0; border-radius: 12px; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    min-width: 700px;
  }
  thead { background: var(--bg3); }
  th {
    padding: 12px 16px;
    text-align: left;
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--text2);
    text-transform: uppercase;
    font-weight: 600;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  td {
    padding: 12px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    vertical-align: top;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(0,200,255,0.03); }
  .num { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; }
  .score-high { color: var(--green); font-weight: 700; }
  .score-mid { color: var(--accent); }
  .score-low { color: var(--red); }
  .center { text-align: center; }
  .caption { font-size: 12px; color: var(--text3); margin: 8px 0 16px; }
  .note { font-size: 12px; color: var(--text3); margin: 8px 0 20px; padding: 12px 16px; background: var(--bg3); border-left: 3px solid var(--accent2); border-radius: 0 8px 8px 0; }

  /* ===== CALLOUT ===== */
  .callout {
    padding: 20px 24px;
    border-radius: 12px;
    margin: 20px 0;
    border-left: 4px solid;
  }
  .callout-blue { background: rgba(0,200,255,0.06); border-color: var(--accent); }
  .callout-purple { background: rgba(124,58,237,0.06); border-color: var(--accent2); }
  .callout-amber { background: rgba(245,158,11,0.06); border-color: var(--accent3); }
  .callout p { font-size: 14px; color: var(--text2); margin: 6px 0; }

  /* ===== BADGES ===== */
  .badge-new { display: inline-block; background: var(--accent2); color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 6px; vertical-align: middle; }
  .badge-free { background: var(--accent); color: var(--bg); font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 700; }

  /* ===== CHARTS ===== */
  .chart-container {
    position: relative;
    margin: 30px 0;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
  }
  .chart-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin: 24px 0;
  }
  .chart-label {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .chart-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .chart-desc {
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 20px;
  }
  canvas { max-width: 100%; }

  /* ===== MAPPING INTERACTIVE LAYOUT v2 ===== */
  .mapping-kpi-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin: 24px 0;
  }
  .mapping-kpi {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    transition: all 0.3s;
  }
  .mapping-kpi:hover {
    border-color: var(--accent);
    box-shadow: 0 0 20px var(--glow);
  }
  .mapping-kpi .kpi-val {
    font-size: 32px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .mapping-kpi .kpi-label {
    font-size: 12px;
    color: var(--text2);
    margin-top: 6px;
    letter-spacing: 0.5px;
  }
  
  .mapping-interactive {
    display: grid;
    grid-template-columns: 280px 1fr 360px;
    gap: 24px;
    margin: 24px 0;
    min-height: 600px;
  }
  
  /* Left: Components Panel */
  .components-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    overflow-y: auto;
    max-height: 700px;
  }
  .components-panel h4 {
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .component-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 8px;
    border: 1px solid transparent;
  }
  .component-item:hover {
    background: var(--bg3);
  }
  .component-item.active {
    background: var(--bg3);
    border-color: var(--accent);
    box-shadow: 0 0 15px var(--glow);
  }
  .component-item .icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .component-item .info {
    flex: 1;
    min-width: 0;
  }
  .component-item .name {
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .component-item .count {
    font-size: 11px;
    color: var(--text3);
  }
  .component-item .arrow {
    opacity: 0;
    transition: opacity 0.2s;
    color: var(--accent);
  }
  .component-item.active .arrow {
    opacity: 1;
  }
  
  /* Center: Robot SVG */
  .robot-center {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .robot-center::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: radial-gradient(ellipse at center, var(--glow2) 0%, transparent 70%);
    pointer-events: none;
  }
  .robot-center h4 {
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 20px;
    position: relative;
    z-index: 1;
  }
  .robot-svg-container {
    position: relative;
    z-index: 1;
  }
  .robot-part {
    cursor: pointer;
    transition: all 0.3s;
    filter: drop-shadow(0 0 0 transparent);
  }
  .robot-part:hover, .robot-part.highlighted {
    filter: drop-shadow(0 0 15px var(--accent));
  }
  .robot-part.highlighted path,
  .robot-part.highlighted rect,
  .robot-part.highlighted circle {
    stroke: var(--accent) !important;
    stroke-width: 2 !important;
  }
  .robot-hint {
    font-size: 12px;
    color: var(--text3);
    margin-top: 16px;
    position: relative;
    z-index: 1;
  }
  
  /* Right: Details Panel */
  .details-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    overflow-y: auto;
    max-height: 700px;
  }
  .details-panel h4 {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .details-panel .subtitle {
    font-size: 12px;
    color: var(--text3);
    margin-bottom: 16px;
  }
  .supplier-section {
    margin-bottom: 16px;
  }
  .supplier-section-title {
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .supplier-card {
    background: var(--bg3);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 8px;
    border: 1px solid transparent;
    transition: all 0.2s;
  }
  .supplier-card:hover {
    border-color: var(--border);
  }
  .supplier-card .name {
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
  }
  .supplier-card .detail {
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 6px;
  }
  .supplier-card .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .sup-tag {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 600;
  }
  .sup-tag.us { background: rgba(59,130,246,0.15); color: #60a5fa; }
  .sup-tag.cn { background: rgba(239,68,68,0.15); color: #f87171; }
  .sup-tag.eu { background: rgba(16,185,129,0.15); color: #34d399; }
  .sup-tag.pub { background: rgba(245,158,11,0.15); color: #fbbf24; }
  .sup-tag.risk { background: rgba(239,68,68,0.15); color: #f87171; }
  .sup-tag.safe { background: rgba(16,185,129,0.15); color: #34d399; }
  .sup-tag.tech { background: rgba(124,58,237,0.15); color: #a78bfa; }
  
  /* China vs US Comparison */
  .cn-us-comparison {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin: 24px 0;
  }
  .compare-col {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
  }
  .compare-col h4 {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .compare-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 13px;
  }
  .compare-item:last-child { border-bottom: none; }
  .compare-item .label { color: var(--text2); }
  .compare-item .val { font-weight: 600; }
  .compare-item .val.green { color: var(--green); }
  .compare-item .val.red { color: var(--red); }
  .compare-item .val.amber { color: var(--accent3); }

  /* ===== PREMIUM PAYWALL ===== */
  .paywall-overlay {
    position: relative;
    max-height: 400px;
    overflow: hidden;
  }
  .paywall-overlay::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 300px;
    background: linear-gradient(to bottom, transparent 0%, var(--bg) 60%);
    pointer-events: none;
  }
  .paywall-box {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    background: var(--card);
    border: 1px solid var(--accent);
    border-radius: 20px;
    padding: 32px 40px;
    text-align: center;
    box-shadow: 0 0 60px rgba(0,200,255,0.3), 0 20px 40px rgba(0,0,0,0.5);
    min-width: 400px;
  }
  .paywall-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 16px;
    letter-spacing: 1px;
  }
  .paywall-title {
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 8px;
  }
  .paywall-desc {
    font-size: 14px;
    color: var(--text2);
    margin-bottom: 20px;
    line-height: 1.6;
  }
  .paywall-features {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin-bottom: 24px;
  }
  .paywall-feature {
    background: var(--bg3);
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 12px;
    color: var(--text2);
  }
  .paywall-cta {
    display: inline-block;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    padding: 14px 40px;
    border-radius: 12px;
    text-decoration: none;
    transition: all 0.3s;
    box-shadow: 0 4px 20px rgba(0,200,255,0.4);
  }
  .paywall-cta:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0,200,255,0.5);
  }
  .paywall-price {
    margin-top: 16px;
    font-size: 13px;
    color: var(--text3);
  }

function setActive(el) {
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));

    document.getElementById('nav').classList.remove('open');

}

const sections = document.querySelectorAll('section[id]');
const navItems = document.querySelectorAll('.nav-item');

  let current = '';

  navItems.forEach(item => {
    item.classList.remove('active');
    if (item.getAttribute('href') === '#' + current) item.classList.add('active');
  });
});

function selectComponent(part) {
  const data = componentData[part];
  if (!data) return;
  
  // Update left panel
  document.querySelectorAll('.component-item').forEach(item => {
    item.classList.remove('active');
    if (item.dataset.part === part) item.classList.add('active');
  });
  
  // Update robot SVG highlight
  document.querySelectorAll('.robot-part').forEach(partEl => {
    partEl.classList.remove('highlighted');
    if (partEl.dataset.part === part) partEl.classList.add('highlighted');
  });
  
  // Update details panel
  const barrierColors = { low: 'var(--green)', mid: 'var(--accent3)', high: 'var(--red)' };
  const barrierText = { low: '低', mid: '中', high: '高' };
  
  let html = `
    <h4>${data.title}</h4>
    <p class="subtitle">${data.subtitle}</p>
    
    <div class="supplier-section">
      <div class="supplier-section-title">🇺🇸 美国供应商</div>
  `;
  
  data.us.forEach(sup => {
    html += `
      <div class="supplier-card">
        <div class="name">${sup.name} ${sup.tags.filter(t => ['us', 'pub'].includes(t)).map(t => `<span class="sup-tag ${t}">${t === 'pub' ? '上市公司' : ''}</span>`).join('')}</div>
        <div class="detail">${sup.detail}</div>
        <div class="tags">${sup.badges.map(b => `<span class="sup-tag ${b}">${b === 'tech' ? '技术领先' : b === 'safe' ? '成熟稳定' : b === 'risk' ? '进口依赖' : ''}</span>`).join('')}</div>
      </div>
    `;
  });
  
  html += `</div><div class="supplier-section"><div class="supplier-section-title">🇨🇳 中国供应商</div>`;
  
  data.cn.forEach(sup => {
    html += `
      <div class="supplier-card">
        <div class="name">${sup.name} ${sup.tags.filter(t => ['cn', 'pub'].includes(t)).map(t => `<span class="sup-tag ${t}">${t === 'pub' ? 'A股' : ''}</span>`).join('')}</div>

  document.getElementById('details-panel').innerHTML = html;
}

const observer = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      e.target.classList.add('visible');
      observer.unobserve(e.target);
    }
  });
}, { threshold: 0.1 });
