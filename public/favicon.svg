<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="fav-bar-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#0072ff"/>
    </linearGradient>
  </defs>
  <!-- 5 bars: heights proportional to logo (14/22/36/22/14 out of 44) scaled to 32px height -->
  <!-- Center bar max height ~20px, outer bars 8/14/14/8 -->
  <rect x="1"  y="22" width="4" height="8"  rx="1" fill="url(#fav-bar-grad)" opacity="0.40"/>
  <rect x="7"  y="17" width="4" height="13" rx="1" fill="url(#fav-bar-grad)" opacity="0.65"/>
  <rect x="13" y="8"  width="4" height="22" rx="1" fill="url(#fav-bar-grad)" opacity="1.0"/>
  <rect x="19" y="17" width="4" height="13" rx="1" fill="url(#fav-bar-grad)" opacity="0.65"/>
  <rect x="25" y="22" width="4" height="8"  rx="1" fill="url(#fav-bar-grad)" opacity="0.40"/>
</svg>
