<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人形机器人核心零部件供应商图谱</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            line-height: 1.6;
        }
        
        /* 背景网格 */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 245, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 245, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }
        
        .bg-grid::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at center, transparent 0%, #0a0a0f 70%);
        }
        
        /* 主容器 */
        .main-container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* 标题样式 */
        .main-title {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .main-title h1 {
            font-size: 32px;
            font-weight: 900;
            background: linear-gradient(135deg, #00f5ff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .main-title p {
            color: #888;
            margin-top: 8px;
            font-size: 14px;
        }
        
        /* 三栏布局 */
        .robot-display {
            display: grid;
            grid-template-columns: 300px 1fr 350px;
            gap: 20px;
            align-items: start;
        }
        
        @media (max-width: 1200px) {
            .robot-display {
                grid-template-columns: 1fr;
                gap: 15px;
            }
        }
        
        /* 面板样式 */
        .panel {
            background: rgba(20, 20, 30, 0.9);
            border: 1px solid rgba(0, 245, 255, 0.2);
            border-radius: 12px;
            padding: 20px;
        }
        
        .panel-title {
            font-size: 16px;
            font-weight: 700;
            color: #00f5ff;
            margin-bottom: 15px;
            padding-left: 12px;
            border-left: 3px solid #00f5ff;
        }
        
        /* 供应商卡片 */
        .supplier-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .supplier-card:hover {
            background: rgba(0, 245, 255, 0.05);
            border-color: rgba(0, 245, 255, 0.3);
        }
        
        .supplier-card.active {
            background: rgba(255, 0, 255, 0.1);
            border-color: #ff00ff;
            border-left: 3px solid #ff00ff;
        }
        
        .supplier-name {
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 4px;
        }
        
        .supplier-name-cn {
            color: #888;
            font-size: 12px;
        }
        
        .supplier-meta {
            display: flex;
            gap: 6px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        
        .tag {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 500;
        }
        
        .tag-public {
            background: rgba(0, 255, 100, 0.15);
            color: #00ff64;
        }
        
        .tag-private {
            background: rgba(255, 170, 0, 0.15);
            color: #ffaa00;
        }
        
        .tag-product {
            background: rgba(0, 245, 255, 0.15);
            color: #00f5ff;
        }
        
        /* 机器人SVG容器 */
        .robot-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 600px;
        }
        
        .robot-svg {
            width: 100%;
            max-width: 280px;
            filter: drop-shadow(0 0 20px rgba(0, 245, 255, 0.3));
        }
        
        /* 热点标记 */
        .hotspot {
            cursor: pointer;
        }
        
        .hotspot:hover .hotspot-circle {
            fill: rgba(0, 245, 255, 0.4);
            stroke-width: 3;
        }
        
        .hotspot.active .hotspot-circle {
            fill: rgba(255, 0, 255, 0.4);
            stroke: #ff00ff;
            stroke-width: 3;
        }
        
        .hotspot-circle {
            fill: rgba(0, 245, 255, 0.2);
            stroke: #00f5ff;
            stroke-width: 2;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { r: 8; opacity: 1; }
            50% { r: 12; opacity: 0.6; }
        }
        
        /* 详情面板 */
        .detail-panel {
            min-height: 500px;
        }
        
        .detail-header {
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 15px;
            margin-bottom: 15px;
        }
        
        .detail-title {
            font-size: 20px;
            font-weight: 700;
            color: #ff00ff;
        }
        
        .detail-subtitle {
            color: #888;
            font-size: 13px;
            margin-top: 4px;
        }
        
        .detail-section {
            margin-bottom: 20px;
        }
        
        .detail-label {
            font-size: 11px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        
        .detail-value {
            font-size: 13px;
            line-height: 1.6;
            color: #ccc;
        }
        
        .detail-products {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        
        .product-tag {
            background: rgba(0, 245, 255, 0.1);
            border: 1px solid rgba(0, 245, 255, 0.3);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            color: #00f5ff;
        }
        
        .detail-customers {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        
        .customer-tag {
            background: rgba(255, 0, 255, 0.1);
            border: 1px solid rgba(255, 0, 255, 0.3);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            color: #ff00ff;
        }
        
        /* 供应商详情卡片 */
        .supplier-detail-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;
        }
        
        .supplier-detail-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 10px;
        }
        
        .supplier-detail-name {
            font-weight: 700;
            font-size: 15px;
        }
        
        .supplier-detail-desc {
            color: #888;
            font-size: 12px;
            margin-top: 4px;
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        
        .empty-state-icon {
            width: 60px;
            height: 60px;
            margin-bottom: 15px;
            opacity: 0.3;
        }
        
        /* 图例 */
        .legend {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #888;
        }
        
        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        
        .legend-dot.reducer { background: #00f5ff; box-shadow: 0 0 10px #00f5ff; }
        .legend-dot.motor { background: #ff00ff; box-shadow: 0 0 10px #ff00ff; }
        .legend-dot.sensor { background: #ffaa00; box-shadow: 0 0 10px #ffaa00; }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .main-title h1 {
                font-size: 22px;
            }
            
            .robot-container {
                min-height: 400px;
            }
            
            .panel {
                padding: 15px;
            }
        }
    </style>
</head>

        let currentPart = null;
        
        function selectPart(partId) {
            // 移除之前的active状态
            document.querySelectorAll('.hotspot').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.supplier-card').forEach(el => el.classList.remove('active'));
            
            // 添加新的active状态
            const hotspots = document.querySelectorAll('[id*="' + partId + '"]');
            hotspots.forEach(el => el.classList.add('active'));
            
            const card = document.querySelector('[data-part="' + partId + '"]');
            if (card) card.classList.add('active');
            
            currentPart = partId;
            
            // 更新详情面板
            updateDetailPanel(partId);
        }
        
        function updateDetailPanel(partId) {
            const data = supplierData[partId];
            if (!data) return;
            
            const panel = document.getElementById('detailPanel');
            
            var suppliersHtml = data.suppliers.map(function(s) {
                return '<div class="supplier-detail-card">' +
                    '<div class="supplier-detail-header">' +
                        '<div>' +
                            '<div class="supplier-detail-name" style="color: ' + (s.status === 'public' ? '#00ff64' : '#ffaa00') + ';">' +
                                s.nameCn + ' ' + s.name +
                            '</div>' +
                            '<div class="supplier-detail-desc">' + s.desc + '</div>' +
                        '</div>' +
                        '<span class="tag ' + (s.status === 'public' ? 'tag-public' : 'tag-private') + '">' +
                            (s.status === 'public' ? '已上市' : '未上市') +
                        '</span>' +
                    '</div>' +
                    '<div class="detail-section" style="margin-top: 12px;">' +
                        '<div class="detail-label">核心产品</div>' +
                        '<div class="detail-products">' +
                            s.products.map(function(p) { return '<span class="product-tag">' + p + '</span>'; }).join('') +
                        '</div>' +
                    '</div>' +
                    '<div class="detail-section" style="margin-top: 12px;">' +
                        '<div class="detail-label">主要客户</div>' +
                        '<div class="detail-customers">' +
                            s.customers.map(function(c) { return '<span class="customer-tag">' + c + '</span>'; }).join('') +
                        '</div>' +
                    '</div>' +
                '</div>';
            }).join('');
