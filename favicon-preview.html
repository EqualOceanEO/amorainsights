<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>favicon preview</title>
  <style>
    body { background: #111827; display: flex; flex-direction: column; align-items: center; padding: 40px; gap: 20px; }
    h1 { color: white; font-family: sans-serif; }
    .row { display: flex; gap: 40px; align-items: flex-end; background: #1f2937; padding: 30px; border-radius: 12px; }
    .item { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .label { color: #9ca3af; font-size: 14px; font-family: monospace; }
    .dark { background: #000; padding: 20px; border-radius: 8px; }
    .light { background: #fff; padding: 20px; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>New Favicon Preview</h1>

  <!-- 黑色背景测试 -->
  <div class="row">
    <div class="item">
      <div class="dark">
        <img src="/favicon.svg" width="64" height="64" alt="64px on black">
      </div>
      <span class="label">64px on black</span>
    </div>
    <div class="item">
      <div class="dark">
        <img src="/favicon.svg" width="32" height="32" alt="32px on black">
      </div>
      <span class="label">32px on black</span>
    </div>
    <div class="item">
      <div class="dark">
        <img src="/favicon.svg" width="16" height="16" alt="16px on black">
      </div>
      <span class="label">16px on black</span>
    </div>
  </div>

  <!-- 白色背景测试 -->
  <div class="row">
    <div class="item">
      <div class="light">
        <img src="/favicon.svg" width="64" height="64" alt="64px on white">
      </div>
      <span class="label">64px on white</span>
    </div>
    <div class="item">
      <div class="light">
        <img src="/favicon.svg" width="32" height="32" alt="32px on white">
      </div>
      <span class="label">32px on white</span>
    </div>
    <div class="item">
      <div class="light">
        <img src="/favicon.svg" width="16" height="16" alt="16px on white">
      </div>
      <span class="label">16px on white</span>
    </div>
  </div>

  <!-- 浏览器标签栏模拟 -->
  <div class="row" style="gap: 20px;">
    <div class="item">
      <div style="display:flex; align-items:center; gap:8px; background:#1f2937; padding:8px 12px; border-radius:6px;">
        <img src="/favicon.svg" width="16" height="16" alt="tab icon">
        <span style="color:#d1d5db; font-size:13px; font-family:sans-serif;">amorainsights.com</span>
      </div>
      <span class="label">浏览器标签栏模拟</span>
    </div>
  </div>

  <p style="color:#6b7280; font-size:13px; font-family:monospace; margin-top:10px;">
    5柱渐变图（#00d4aa → #0072ff），与导航栏logo一致
  </p>
</body>
</html>
